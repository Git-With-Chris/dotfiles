# Colors #############################
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# General #############################
# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1 instead of 0 (easier to reach on keyboard)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse support (click to switch panes, resize, scroll)
set -g mouse on

# Remove delay after pressing escape (important for nvim)
set -sg escape-time 0

# Increase scrollback buffer size
set -g history-limit 10000

# Refresh status bar every second
set -g status-interval 1

# Keybindings #############################
# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes (prefix + \ or -)
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"